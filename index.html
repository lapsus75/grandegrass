<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>grandegrass.com</title>
<style>
    body {
        margin: 0;
        height: 100vh;
        background-color: black;
        color: #00ff00;
        font-family: "Courier New", monospace;
        display: flex;
        justify-content: center;
        align-items: center;
        flex-direction: column;
    }

    h1 {
        font-size: 4em;
        margin: 0;
        letter-spacing: 0.1em;
    }

    h2 {
        font-size: 1.5em;
        margin: 0.2em 0 1em 0;
        color: #00cc00;
    }

    .cursor {
        display: inline-block;
        width: 10px;
        background-color: #00ff00;
        animation: blink 1s step-start infinite;
        margin-left: 5px;
    }

    @keyframes blink {
        50% { background-color: transparent; }
    }

    .terminal-box {
        text-align: center;
        border: 2px solid #00ff00;
        padding: 2em;
        box-shadow: 0 0 20px #00ff00;
    }
</style>
</head>
<body>

<div class="terminal-box">
    <h1>GRASS</h1>
    <h2>grandegrass.com</h2>
    <div>
        > accesso al sistema<span class="cursor"></span>
    </div>
</div>

</body>
</html>
